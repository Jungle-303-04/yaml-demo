apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: yaml-demo
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Jungle-303-04/yaml-demo.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: yaml-demo-dev
  namespace: flux-system
spec:
  interval: 5m
  path: ./manifests/overlays/dev
  prune: false
  sourceRef:
    kind: GitRepository
    name: yaml-demo
  targetNamespace: yaml-demo

