apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-api
  namespace: yaml-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  endpoints:
    - port: http
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-api
  namespace: yaml-demo
spec:
  groups:
    - name: yaml-demo.rules
      rules:
        - alert: DemoApiUnavailable
          expr: up{namespace="yaml-demo",service="demo-api"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: demo-api target is unavailable

