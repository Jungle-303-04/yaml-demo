apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-api-config
  namespace: yaml-demo
data:
  APP_MODE: demo
  HTTP_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: yaml-demo
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: yaml-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-api
        app.kubernetes.io/part-of: yaml-demo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: demo-api-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-runtime
              mountPath: /tmp
      volumes:
        - name: nginx-runtime
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: demo-node-observer
  namespace: yaml-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-node-observer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-node-observer
    spec:
      automountServiceAccountToken: false
      containers:
        - name: observer
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 25m
              memory: 16Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
