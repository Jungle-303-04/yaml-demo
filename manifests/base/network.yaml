apiVersion: v1
kind: Service
metadata:
  name: demo-api
  namespace: yaml-demo
spec:
  selector:
    app.kubernetes.io/name: demo-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-api
  namespace: yaml-demo
spec:
  ingressClassName: nginx
  rules:
    - host: yaml-demo.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-api
                port:
                  name: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-api-ingress
  namespace: yaml-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

