apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-report
  namespace: yaml-demo
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          containers:
            - name: report
              image: busybox:1.36.1
              command: ["sh", "-c", "date -u"]
              resources:
                requests:
                  cpu: 5m
                  memory: 8Mi
                limits:
                  cpu: 25m
                  memory: 16Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-cache
  namespace: yaml-demo
spec:
  serviceName: demo-cache
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-cache
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cache
          image: registry.k8s.io/pause:3.10
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 25m
              memory: 16Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-gp3
        resources:
          requests:
            storage: 1Gi
