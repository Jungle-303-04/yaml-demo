apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-api
  namespace: yaml-demo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-api
  namespace: yaml-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-reader
  namespace: yaml-demo
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-config-reader
  namespace: yaml-demo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-config-reader
  namespace: yaml-demo
subjects:
  - kind: ServiceAccount
    name: demo-reader
    namespace: yaml-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-config-reader

