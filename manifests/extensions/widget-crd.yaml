apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.demo.opsia.dev
spec:
  group: demo.opsia.dev
  scope: Namespaced
  names:
    plural: widgets
    singular: widget
    kind: Widget
    shortNames: [wdg]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [replicas, channel]
              properties:
                replicas:
                  type: integer
                  minimum: 1
                channel:
                  type: string
                  enum: [stable, preview]
---
apiVersion: demo.opsia.dev/v1alpha1
kind: Widget
metadata:
  name: demo-widget
  namespace: yaml-demo
spec:
  replicas: 2
  channel: stable
